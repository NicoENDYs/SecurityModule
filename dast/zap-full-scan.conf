# zap-full-scan.conf — ZAP full-scan configuration for active DAST testing.
# Used with: zap-full-scan.py -z "-config file=/zap/config/zap-full-scan.conf"
#
# WARNING: Active scanning sends attack payloads to the target.
#          Only use this against applications you own or have written permission to test.
#
# Reference: https://www.zaproxy.org/docs/desktop/addons/automation-framework/

# ── Connection ─────────────────────────────────────────────────────────────────
connection.timeoutInSecs=20
connection.defaultUserAgent=ZAP-SecurityTest/1.0

# ── Spider configuration ───────────────────────────────────────────────────────
spider.maxDepth=10
spider.threadCount=5
spider.maxChildren=0
spider.parseComments=true
spider.parseSVNentries=false
spider.parseGit=false
spider.parseRobotstxt=true
spider.parseSitemapXml=true
spider.handleODataParametersVisited=false
spider.skipURL=

# ── Ajax Spider (for SPA / React apps) ────────────────────────────────────────
ajaxSpider.browserId=firefox-headless
ajaxSpider.maxDuration=5
ajaxSpider.maxCrawlDepth=10
ajaxSpider.numberOfBrowsers=4
ajaxSpider.maxStates=0
ajaxSpider.maxDuration=10

# ── Active Scan ────────────────────────────────────────────────────────────────
ascan.maxScanDurationInMins=60
ascan.maxRuleDurationInMins=0
ascan.threadPerHost=2
ascan.delayInMs=0
ascan.maxResultsToList=1000
ascan.maxScansInUI=5

# Scan policy: choose one of DEFAULT, LIGHT, MEDIUM, INSANE
ascan.defaultPolicy=DEFAULT

# ── Passive Scan ──────────────────────────────────────────────────────────────
pscan.maxAlertsPerRule=10
pscan.maxBodySizeInBytesToScan=0

# ── Alert Thresholds ──────────────────────────────────────────────────────────
# Values: OFF, DEFAULT, LOW, MEDIUM, HIGH
alert.maxInstances=10
alert.mergeRelated=true

# ── Report ────────────────────────────────────────────────────────────────────
report.title=ZAP Full Scan Report
report.description=Active DAST scan results
report.displayReport=false

# ── Authentication (uncomment and configure as needed) ────────────────────────
