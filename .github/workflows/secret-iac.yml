name: Secret & IaC Scan

# Reusable (workflow_call): invoked from the consumer's security.yml.
# Complements trivy.yml — Gitleaks scans the full git history for leaked
# credentials, and Checkov adds broader IaC policy coverage than trivy-config.
# Both run via Docker, consistent with the "install nothing on the host"
# philosophy. Image tags are kept in sync with versions.env by update-versions.yml.
on:
  workflow_call:

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab
  actions: read

jobs:
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0          # Gitleaks scans the whole git history

      - name: Gitleaks (via Docker)
        run: |
          docker run --rm -v "$PWD":/repo \
            zricethezav/gitleaks:v8.21.2 \
            detect \
              --source=/repo \
              --report-format=sarif \
              --report-path=/repo/gitleaks.sarif \
              --redact \
              --exit-code=0

      - name: Upload SARIF (Gitleaks)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  checkov:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkov (via Docker)
        run: |
          docker run --rm -v "$PWD":/tf \
            bridgecrew/checkov:3.2.334 \
              --directory /tf \
              --output sarif \
              --output-file-path /tf \
              --soft-fail
          # To restrict to specific frameworks, add e.g.:
          #   --framework dockerfile github_actions secrets terraform kubernetes

      - name: Upload SARIF (Checkov)
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: results.sarif
          category: checkov
