name: ZAP DAST Baseline Scan

on:
  workflow_dispatch:
    inputs:
      target-url:
        description: "URL of the application to scan"
        required: true
        type: string
      scan-type:
        description: "Scan type: baseline (passive) or full (active)"
        required: false
        type: choice
        options:
          - baseline
          - full
        default: baseline
      fail-on-warnings:
        description: "Fail the workflow if ZAP reports WARN-level alerts"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      target-url:
        description: "URL of the application to scan"
        required: true
        type: string
      scan-type:
        description: "Scan type: baseline | full"
        required: false
        type: string
        default: "baseline"
      fail-on-warnings:
        description: "Fail if WARN-level alerts are found"
        required: false
        type: boolean
        default: false
      module-ref:
        description: "Git ref of NicoENDYs/SecurityModule to source rules.tsv from"
        required: false
        type: string
        default: "v1"
      rules-file:
        description: "Path to ZAP rules.tsv (relative to workspace root)"
        required: false
        type: string
        default: ".security-module/templates/zap/rules.tsv"

permissions:
  contents: read
  issues: write       # ZAP action opens GitHub Issues with findings
  pull-requests: write

jobs:
  zap-scan:
    name: OWASP ZAP — ${{ inputs.scan-type || 'baseline' }} scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout SecurityModule (rules.tsv lives here)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: NicoENDYs/SecurityModule
          ref: ${{ inputs.module-ref || 'v1' }}
          path: .security-module

      - name: ZAP Baseline Scan (passive)
        if: ${{ inputs.scan-type == 'baseline' || inputs.scan-type == '' }}
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target-url }}
          rules_file_name: ${{ inputs.rules-file || '.security-module/templates/zap/rules.tsv' }}
          cmd_options: "-I"
          fail_action: ${{ inputs.fail-on-warnings && 'true' || 'false' }}
          artifact_name: "zap-baseline-report"
          allow_issue_writing: true

      - name: ZAP Full Scan (active — use only against environments you own)
        if: ${{ inputs.scan-type == 'full' }}
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ inputs.target-url }}
          rules_file_name: ${{ inputs.rules-file || '.security-module/templates/zap/rules.tsv' }}
          cmd_options: "-I"
          fail_action: ${{ inputs.fail-on-warnings && 'true' || 'false' }}
          artifact_name: "zap-full-scan-report"
          allow_issue_writing: true

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        if: always()
        with:
          name: zap-report-${{ inputs.scan-type || 'baseline' }}-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30
          if-no-files-found: ignore
