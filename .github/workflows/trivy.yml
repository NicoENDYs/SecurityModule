name: Trivy Security Scan

# This workflow is designed exclusively for workflow_call (reusable).
# It does NOT run on push/PR/schedule in this repo — those triggers live in ci.yml.
on:
  workflow_call:
    inputs:
      image-ref:
        description: "Docker image to scan (leave empty to scan filesystem only)"
        required: false
        type: string
        default: ""
      severity:
        description: "Comma-separated severity levels to report"
        required: false
        type: string
        default: "HIGH,CRITICAL"
      fail-on-findings:
        description: "Exit with error code if vulnerabilities are found"
        required: false
        type: boolean
        default: false
      trivy-config:
        description: "Path to a Trivy config file in your repository (leave empty to use the .trivy.yaml shipped with SecurityModule)"
        required: false
        type: string
        default: ""
      module-ref:
        description: "Git ref of NicoENDYs/SecurityModule to source the default .trivy.yaml from"
        required: false
        type: string
        default: "v1"
    outputs:
      critical-count:
        description: "Number of CRITICAL vulnerabilities found in the filesystem scan"
        value: ${{ jobs.trivy-fs.outputs.critical-count }}

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results
  actions: read

jobs:
  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    outputs:
      critical-count: ${{ steps.parse.outputs.critical }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The default Trivy config ships with SecurityModule, not with the consumer
      # repo — check the module out so the config path below always exists.
      - name: Checkout SecurityModule (default .trivy.yaml lives here)
        if: ${{ inputs.trivy-config == '' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NicoENDYs/SecurityModule
          ref: ${{ inputs.module-ref || 'v1' }}
          path: .security-module

      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@18f2505d82a6b8627de8d67e056a0e7db864cfe6 # v0.31.0
        with:
          scan-type: "fs"
          scan-ref: "."
          trivy-config: ${{ inputs.trivy-config || '.security-module/.trivy.yaml' }}
          severity: ${{ inputs.severity || 'HIGH,CRITICAL' }}
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-fs-results.sarif"

      - name: Parse critical count from SARIF
        id: parse
        if: always()
        run: |
          COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' trivy-fs-results.sarif 2>/dev/null || echo 0)
          echo "critical=$COUNT" >> "$GITHUB_OUTPUT"
          {
            echo "### 🛡️ Trivy — filesystem scan"
            echo ""
            echo "CRITICAL (error-level) findings: **${COUNT}**"
            echo ""
            echo "See **Security → Code scanning alerts** (category \`trivy-filesystem\`) for details."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Trivy FS scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: "trivy-fs-results.sarif"
          category: "trivy-filesystem"

      - name: Run Trivy — table output (PR comment preview)
        uses: aquasecurity/trivy-action@18f2505d82a6b8627de8d67e056a0e7db864cfe6 # v0.31.0
        with:
          scan-type: "fs"
          scan-ref: "."
          trivy-config: ${{ inputs.trivy-config || '.security-module/.trivy.yaml' }}
          severity: ${{ inputs.severity || 'HIGH,CRITICAL' }}
          exit-code: "0"
          ignore-unfixed: true
          format: "table"

  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    if: ${{ inputs.image-ref != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy — image scan
        uses: aquasecurity/trivy-action@18f2505d82a6b8627de8d67e056a0e7db864cfe6 # v0.31.0
        with:
          scan-type: "image"
          image-ref: ${{ inputs.image-ref }}
          severity: ${{ inputs.severity || 'HIGH,CRITICAL' }}
          exit-code: ${{ inputs.fail-on-findings && '1' || '0' }}
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-image-results.sarif"

      - name: Upload Trivy image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: "trivy-image-results.sarif"
          category: "trivy-image"

  trivy-config:
    name: IaC / Misconfiguration Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy — config scan (IaC misconfigurations)
        uses: aquasecurity/trivy-action@18f2505d82a6b8627de8d67e056a0e7db864cfe6 # v0.31.0
        with:
          scan-type: "config"
          scan-ref: "."
          severity: ${{ inputs.severity || 'HIGH,CRITICAL' }}
          exit-code: "0"
          format: "sarif"
          output: "trivy-config-results.sarif"

      - name: Upload Trivy config scan results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: "trivy-config-results.sarif"
          category: "trivy-config"
