name: CI — Self-validation

# Validates the security module itself on every PR and push to main.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shellcheck:
    name: ShellCheck — bash scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all bash scripts
        run: |
          shellcheck --source-path=SCRIPTDIR -x \
            scripts/scan-trivy.sh \
            scripts/scan-zap-baseline.sh \
            scripts/scan-full-dockerized.sh \
            scripts/docker-bench.sh \
            node-web/audit.sh \
            setup.sh

  actionlint:
    name: actionlint — workflow syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download and run actionlint
        run: |
          bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  semgrep-rules-test:
    name: Semgrep — rule unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Semgrep rule tests
        run: |
          docker run --rm \
            -v "$PWD/node-web":/src \
            returntocorp/semgrep:1.95.0 \
            sh -c '
              set -e
              mkdir -p /tmp/semgrep-tests
              cp /src/tests/*.js /src/tests/*.jsx /tmp/semgrep-tests/ 2>/dev/null || true
              for f in /tmp/semgrep-tests/*.js /tmp/semgrep-tests/*.jsx; do
                [ -f "$f" ] || continue
                stem=$(basename "${f%.*}")
                cp /src/semgrep.yml /tmp/semgrep-tests/"${stem}.yml"
              done
              semgrep --test /tmp/semgrep-tests/
            '
