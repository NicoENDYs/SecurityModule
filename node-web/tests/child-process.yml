rules:
  - id: no-child-process-exec-with-variable
    pattern-either:
      - pattern: require('child_process').exec($CMD, ...)
      - patterns:
          - pattern: $FN($CMD, ...)
          - pattern-inside: |
              const { $FN } = require('child_process')
              ...
          - metavariable-regex:
              metavariable: $FN
              regex: '^exec$'
      - patterns:
          - pattern: $FN($CMD, ...)
          - pattern-inside: |
              import { $FN } from 'child_process'
              ...
          - metavariable-regex:
              metavariable: $FN
              regex: '^exec$'
      - patterns:
          - pattern: $NS.exec($CMD, ...)
          - pattern-inside: |
              import * as $NS from 'child_process'
              ...
    message: "child_process.exec() with a variable is vulnerable to command injection. Use execFile() or spawn() with an args array."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-78"

  - id: no-child-process-execsync-with-variable
    pattern-either:
      - pattern: require('child_process').execSync($CMD, ...)
      - patterns:
          - pattern: $FN($CMD, ...)
          - pattern-inside: |
              const { $FN } = require('child_process')
              ...
          - metavariable-regex:
              metavariable: $FN
              regex: '^execSync$'
      - patterns:
          - pattern: $FN($CMD, ...)
          - pattern-inside: |
              import { $FN } from 'child_process'
              ...
          - metavariable-regex:
              metavariable: $FN
              regex: '^execSync$'
      - patterns:
          - pattern: $NS.execSync($CMD, ...)
          - pattern-inside: |
              import * as $NS from 'child_process'
              ...
    message: "execSync() with a variable is vulnerable to command injection."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-78"
