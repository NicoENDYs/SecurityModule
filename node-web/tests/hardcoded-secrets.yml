rules:
  - id: no-hardcoded-jwt-secret
    pattern-either:
      - pattern: jwt.sign($PAYLOAD, "...", ...)
      - pattern: jwt.verify($TOKEN, "...", ...)
    message: "Hardcoded JWT secret detected. Load secrets from environment variables."
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      category: security
      cwe: "CWE-798"

  - id: no-hardcoded-password-in-object
    pattern-either:
      - pattern: |
          {password: "..."}
      - pattern: |
          {secret: "..."}
      - pattern: |
          {apiKey: "..."}
    message: "Potential hardcoded credential. Use environment variables or a secrets manager."
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-798"
